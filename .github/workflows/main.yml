name: Backend - Production Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run unit tests
        run: mvn test

      - name: SonarQube scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: recipewebappacrdev.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push production image
        run: |
          docker build -t recipewebappacrdev.azurecr.io/recipe-backend:${{ github.sha }} .
          docker build -t recipewebappacrdev.azurecr.io/recipe-backend:latest .
          docker push recipewebappacrdev.azurecr.io/recipe-backend:${{ github.sha }}
          docker push recipewebappacrdev.azurecr.io/recipe-backend:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: recipewebappacrdev.azurecr.io/recipe-backend:latest
          format: table
          exit-code: 0
        env:
          TRIVY_USERNAME: ${{ secrets.ACR_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.ACR_PASSWORD }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: recipe-backend-dev
          images: recipewebappacrdev.azurecr.io/recipe-backend:${{ github.sha }}
