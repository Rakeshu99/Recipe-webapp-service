apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: recipe-webapp
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_USERNAME/recipe-backend:latest #TO-DO: replace with ACR
          ports:
            - containerPort: 8080

          # Optional but recommended
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

          # Health checks (recommended)
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10

#---------------------

apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: recipe-webapp
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP